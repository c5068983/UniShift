{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/auth/register.css') }}">

<div class="d-flex justify-content-center align-items-center" style="min-height: 90vh;">

  <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px; border-radius: 12px;">

    <h3 class="text-center mb-3">Login with OTP</h3>

    <p class="text-muted text-center mb-4" style="font-size: 14px;">
      Enter your email and we’ll send a one-time password
    </p>

    <form method="POST" action="{{ url_for('auth.login_otp') }}">

      <!-- EMAIL -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
      </div>

      <!-- SEND OTP -->
      <div class="d-grid mt-3">
        <button type="submit" class="btn btn-primary">
          Send OTP
        </button>
      </div>

    </form>

    <!-- BACK LINKS -->
    <div class="text-center mt-3">
      <a href="{{ url_for('auth.login') }}">← Login with Password</a>
    </div>

  </div>

</div>

{% endblock %}
