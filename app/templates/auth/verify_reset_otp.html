{% extends "base.html" %}
{% block content %}

<link rel="stylesheet" href="{{ url_for('static', filename='css/auth/register.css') }}">

<div class="d-flex justify-content-center align-items-center" style="min-height: 90vh;">

  <div class="card shadow-lg p-4" style="width: 100%; max-width: 420px; border-radius: 12px;">

    <h3 class="text-center mb-3">Verify OTP</h3>

    <p class="text-muted text-center mb-4" style="font-size: 14px;">
      Enter the OTP sent to your email
    </p>

    <form method="POST">

      <!-- OTP INPUT -->
      <div class="mb-3">
        <label class="form-label">OTP Code</label>
        <input type="text"
               name="otp"
               class="form-control"
               placeholder="Enter 6-digit OTP"
               maxlength="6"
               required>
      </div>

      <!-- VERIFY BUTTON -->
      <div class="d-grid mt-3">
        <button type="submit" class="btn btn-primary">
          Verify OTP
        </button>
      </div>

    </form>

    <!-- RESEND OTP -->
    <div class="text-center mt-3">

      <a href="{{ url_for('auth.resend_reset_otp') }}">
        Resend OTP
      </a>

      <br>

      <small class="text-muted">
        Didn’t receive it? Check spam folder.
      </small>

    </div>

  </div>

</div>

{% endblock %}
