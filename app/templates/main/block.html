<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Blocked</title>

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light d-flex justify-content-center align-items-center vh-100">

    <div class="card shadow-lg border-0 text-center p-4" style="max-width: 450px;">
        
        <div class="mb-3">
            <span class="display-1 text-danger">🚫</span>
        </div>

        <h2 class="text-danger fw-bold">Account Blocked</h2>

        <p class="text-muted mt-3">
            Your account has been blocked by the administrator due to policy violations 
            or suspicious activity.
        </p>

        <p class="text-muted">
            If you think this is a mistake, please contact support.
        </p>

        <div class="mt-4">
            <a href="mailto:support@unishift.com" class="btn btn-primary px-4">
                Contact Support
            </a>
        </div>

    </div>

</body>
</html>
